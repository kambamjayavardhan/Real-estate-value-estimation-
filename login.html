<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <title>PropSmart India — Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #141927;
            --surface2: #1c2235;
            --border: rgba(255,255,255,0.07);
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --text: #e8eaf0;
            --muted: #6b7280;
            --error: #ff6b6b;
            --success: #00d4aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated mesh background */
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(108, 99, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0, 212, 170, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 60% 10%, rgba(108, 99, 255, 0.06) 0%, transparent 60%);
            animation: meshMove 12s ease-in-out infinite alternate;
        }
        @keyframes meshMove {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.05) rotate(2deg); }
        }

        /* Grid dots */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px;
            padding: 20px;
        }

        /* Branding */
        .brand {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeDown 0.6s ease both;
        }
        .brand-logo {
            display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 24px rgba(108,99,255,0.4);
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .brand-name span { color: var(--accent2); }
        .brand-sub { font-size: 13px; color: var(--muted); }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tab switcher */
        .tabs {
            display: grid; grid-template-columns: 1fr 1fr;
            background: var(--surface2);
            border-radius: 12px; padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            padding: 10px;
            border: none; background: none; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            color: var(--muted);
            border-radius: 9px;
            transition: all 0.25s ease;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(108,99,255,0.35);
        }

        /* Form title */
        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .form-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

        /* Fields */
        .field-group { margin-bottom: 16px; }
        .field-label {
            display: block;
            font-size: 12px; font-weight: 500;
            color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.6px;
            margin-bottom: 7px;
            transition: color 0.2s ease;
        }
        .field-group:focus-within .field-label {
            color: var(--accent);
        }

        /* UIverse-style animated field wrapper */
        .field-wrap {
            display: flex; align-items: center; gap: 10px;
            width: 100%;
            background: var(--surface2);
            border-radius: 12px;
            padding: 12px 16px;
            /* The magic: outline animates offset inward on focus */
            outline: 2px solid rgba(108, 99, 255, 0.35);
            outline-offset: 3px;
            border: 0;
            transition: outline-offset 0.2s ease,
                        outline-color 0.2s ease,
                        background 0.2s ease,
                        box-shadow 0.2s ease;
        }
        /* Hover: brighten background slightly */
        .field-wrap:hover {
            background: #202840;
            outline-color: rgba(108, 99, 255, 0.6);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.12);
        }
        /* Focus: outline collapses inward (the UIverse trick) */
        .field-wrap:focus-within {
            outline-offset: -5px;
            outline-color: var(--accent);
            background: #1a2035;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12),
                        0 6px 20px rgba(108, 99, 255, 0.15);
        }
        /* Error state */
        .field-wrap.has-error {
            outline-color: var(--error);
        }
        .field-wrap.has-error:focus-within {
            outline-color: var(--error);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.12);
        }
        /* Success state (after validation passes) */
        .field-wrap.is-valid {
            outline-color: var(--accent2);
        }

        .field-icon {
            font-size: 16px; flex-shrink: 0;
            color: var(--muted);
            transition: transform 0.25s ease, filter 0.25s ease;
        }
        .field-wrap:focus-within .field-icon {
            transform: scale(1.15);
            filter: drop-shadow(0 0 4px rgba(108,99,255,0.6));
        }

        .field-input {
            background: none; border: none; outline: none;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; color: var(--text);
            transition: color 0.2s;
        }
        .field-input::placeholder {
            color: #3a404f;
            transition: opacity 0.2s ease;
        }
        .field-input:focus::placeholder {
            opacity: 0.5;
        }

        .toggle-pw {
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 16px;
            padding: 0; line-height: 1;
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }
        .toggle-pw:hover { color: var(--accent); transform: scale(1.1); }

        .field-error {
            font-size: 12px; color: var(--error);
            margin-top: 5px; margin-left: 4px;
            min-height: 16px;
        }

        /* Submit button */
        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #9b59b6 100%);
            color: #fff; border: none; border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(108,99,255,0.3);
            position: relative; overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        .submit-btn:hover::after { left: 100%; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
            color: var(--muted); font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }

        /* Toast notification */
        .toast {
            position: fixed; top: 20px; right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; color: var(--text);
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
            z-index: 100; max-width: 320px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--error); }
        .toast-icon { font-size: 18px; }

        .form { display: none; }
        .form.active { display: block; }

        /* Forgot pw link */
        .link-btn {
            background: none; border: none; cursor: pointer;
            color: var(--accent); font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            text-decoration: underline;
            padding: 0;
        }
        .link-btn:hover { color: var(--accent2); }

        .pw-row {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 7px;
        }

        /* Strength bar */
        .strength-bar {
            display: flex; gap: 4px; margin-top: 6px;
        }
        .strength-seg {
            height: 3px; flex: 1; border-radius: 2px;
            background: var(--surface2);
            transition: background 0.3s;
        }
        .strength-text { font-size: 11px; color: var(--muted); margin-top: 4px; }
    </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon"></span>
    <span id="toastMsg"></span>
</div>

<div class="wrapper">
    <div class="brand">
        <div class="brand-logo">
            <div class="logo-icon">🏡</div>
            <span class="brand-name">Prop<span>Smart</span></span>
        </div>
        <p class="brand-sub">India Real Estate Valuation Platform</p>
    </div>

    <div class="card">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div class="form active" id="loginForm">
            <p class="form-title">Welcome back</p>
            <p class="form-subtitle">Sign in to access your property estimates</p>

            <div class="field-group">
                <label class="field-label" for="loginEmail">Email Address</label>
                <div class="field-wrap">
                    <span class="field-icon">✉️</span>
                    <input type="email" id="loginEmail" class="field-input" placeholder="you@example.com" autocomplete="email"
                        oninput="liveValidate(this, v => isValidEmail(v.trim()), 'loginEmailErr', '')">
                </div>
                <div class="field-error" id="loginEmailErr"></div>
            </div>

            <div class="field-group">
                <div class="pw-row">
                    <label class="field-label" for="loginPw" style="margin-bottom:0">Password</label>
                </div>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="loginPw" class="field-input" placeholder="Enter your password" autocomplete="current-password"
                        oninput="liveValidate(this, v => v.length >= 1, 'loginPwErr', '')">
                    <button class="toggle-pw" onclick="togglePw('loginPw',this)" type="button">👁️</button>
                </div>
                <div class="field-error" id="loginPwErr"></div>
            </div>

            <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
                <span>Sign In</span> <span>→</span>
            </button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="form" id="signupForm">
            <p class="form-title">Create your account</p>
            <p class="form-subtitle">Join thousands of property seekers across India</p>

            <div class="field-group">
                <label class="field-label" for="signupName">Full Name</label>
                <div class="field-wrap">
                    <span class="field-icon">👤</span>
                    <input type="text" id="signupName" class="field-input" placeholder="Rajesh Kumar" autocomplete="name"
                        oninput="liveValidate(this, v => v.trim().length >= 3, 'signupNameErr', '')">
                </div>
                <div class="field-error" id="signupNameErr"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="signupEmail">Email Address</label>
                <div class="field-wrap">
                    <span class="field-icon">✉️</span>
                    <input type="email" id="signupEmail" class="field-input" placeholder="you@example.com" autocomplete="email"
                        oninput="liveValidate(this, v => isValidEmail(v.trim()), 'signupEmailErr', '')">
                </div>
                <div class="field-error" id="signupEmailErr"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="signupId">Student / Employee ID</label>
                <div class="field-wrap">
                    <span class="field-icon">🪪</span>
                    <input type="text" id="signupId" class="field-input" placeholder="e.g. STU2024001"
                        oninput="liveValidate(this, v => v.trim().length >= 5, 'signupIdErr', '')">
                </div>
                <div class="field-error" id="signupIdErr"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="signupPw">Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="signupPw" class="field-input" placeholder="Create a strong password" oninput="checkStrength(); liveValidate(this, v => v.length >= 8, 'signupPwErr', '')" autocomplete="new-password">
                    <button class="toggle-pw" onclick="togglePw('signupPw',this)" type="button">👁️</button>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <div class="strength-seg" id="s1"></div>
                    <div class="strength-seg" id="s2"></div>
                    <div class="strength-seg" id="s3"></div>
                    <div class="strength-seg" id="s4"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
                <div class="field-error" id="signupPwErr"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="signupConfirm">Confirm Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="signupConfirm" class="field-input" placeholder="Repeat your password" autocomplete="new-password"
                        oninput="liveValidate(this, v => v === document.getElementById('signupPw').value && v.length > 0, 'signupConfirmErr', '')">
                    <button class="toggle-pw" onclick="togglePw('signupConfirm',this)" type="button">👁️</button>
                </div>
                <div class="field-error" id="signupConfirmErr"></div>
            </div>

            <button class="submit-btn" id="signupBtn" onclick="handleSignup()">
                <span>Create Account</span> <span>✨</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ---- Simple hash (not crypto-grade but better than plain text) ----
    async function hashPassword(pw) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'propsmartSalt2024'));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function getStudents() {
        try { return JSON.parse(localStorage.getItem('ps_students') || '[]'); } catch { return []; }
    }
    function saveStudents(arr) { localStorage.setItem('ps_students', JSON.stringify(arr)); }

    function switchTab(tab) {
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
        clearErrors();
    }

    // Live real-time field validation — shows green/red outline as user types
    function liveValidate(inputEl, testFn, errId, errMsg) {
        const wrap = inputEl.closest('.field-group')?.querySelector('.field-wrap');
        if (!wrap) return;
        const val = inputEl.value;
        if (val.length === 0) {
            // Neutral when empty
            wrap.classList.remove('has-error', 'is-valid');
            if (errId) document.getElementById(errId).textContent = '';
            return;
        }
        if (testFn(val)) {
            wrap.classList.remove('has-error');
            wrap.classList.add('is-valid');
            if (errId) document.getElementById(errId).textContent = '';
        } else {
            wrap.classList.remove('is-valid');
            // Don't show error text while typing — only on submit
        }
    }

    function clearErrors() {
        document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
        document.querySelectorAll('.field-wrap').forEach(w => {
            w.classList.remove('has-error', 'is-valid');
        });
    }

    function setErr(id, msg) {
        const errEl = document.getElementById(id);
        errEl.textContent = msg;
        // Mark the parent field-wrap as error
        const wrap = errEl.closest('.field-group')?.querySelector('.field-wrap');
        if (wrap) { wrap.classList.add('has-error'); wrap.classList.remove('is-valid'); }
    }

    function setValid(wrapEl) {
        wrapEl.classList.remove('has-error');
        wrapEl.classList.add('is-valid');
    }

    function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    function togglePw(id, btn) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
        toast.className = 'toast show ' + type;
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Please wait...</span>';
        } else {
            btn.disabled = false;
        }
    }

    function checkStrength() {
        const pw = document.getElementById('signupPw').value;
        const segs = ['s1','s2','s3','s4'];
        const colors = ['#ff6b6b','#ffaa33','#ffd700','#00d4aa'];
        const labels = ['Weak','Fair','Good','Strong'];
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        segs.forEach((s, i) => {
            document.getElementById(s).style.background = i < score ? colors[score - 1] : '';
        });
        document.getElementById('strengthText').textContent = pw.length > 0 ? labels[score - 1] || '' : '';
    }

    async function handleLogin() {
        clearErrors();
        const email = document.getElementById('loginEmail').value.trim();
        const pw = document.getElementById('loginPw').value;
        let ok = true;
        if (!email) { setErr('loginEmailErr', 'Email is required'); ok = false; }
        else if (!isValidEmail(email)) { setErr('loginEmailErr', 'Enter a valid email'); ok = false; }
        if (!pw) { setErr('loginPwErr', 'Password is required'); ok = false; }
        if (!ok) return;

        setLoading('loginBtn', true);
        const hash = await hashPassword(pw);
        const students = getStudents();
        const user = students.find(s => s.email === email);

        setTimeout(() => {
            setLoading('loginBtn', false);
            document.getElementById('loginBtn').innerHTML = '<span>Sign In</span><span>→</span>';

            if (!user) { setErr('loginEmailErr', 'No account found — please sign up'); return; }
            if (user.password !== hash) { setErr('loginPwErr', 'Incorrect password'); return; }

            // Clear ALL previous session data before setting new user
            sessionStorage.clear();

            // Save new user session
            sessionStorage.setItem('ps_session', JSON.stringify({
                name:    user.name,
                email:   user.email,
                id:      user.studentId,
                loginAt: Date.now()
            }));
            sessionStorage.setItem('ps_login_welcome', user.name);

            window.location.href = 'dashboard.html';
        }, 700);
    }

    async function handleSignup() {
        clearErrors();
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const sid = document.getElementById('signupId').value.trim();
        const pw = document.getElementById('signupPw').value;
        const cpw = document.getElementById('signupConfirm').value;
        let ok = true;

        if (!name || name.length < 3) { setErr('signupNameErr', 'Name must be at least 3 characters'); ok = false; }
        if (!email) { setErr('signupEmailErr', 'Email is required'); ok = false; }
        else if (!isValidEmail(email)) { setErr('signupEmailErr', 'Enter a valid email'); ok = false; }
        if (!sid || sid.length < 5) { setErr('signupIdErr', 'ID must be at least 5 characters'); ok = false; }
        if (!pw || pw.length < 8) { setErr('signupPwErr', 'Password must be at least 8 characters'); ok = false; }
        if (pw !== cpw) { setErr('signupConfirmErr', 'Passwords do not match'); ok = false; }
        if (!ok) return;

        const students = getStudents();
        if (students.some(s => s.email === email)) { setErr('signupEmailErr', 'Email already registered'); return; }
        if (students.some(s => s.studentId === sid)) { setErr('signupIdErr', 'This ID is already taken'); return; }

        setLoading('signupBtn', true);
        const hash = await hashPassword(pw);

        setTimeout(() => {
            students.push({ name, email, studentId: sid, password: hash, createdAt: Date.now() });
            saveStudents(students);
            setLoading('signupBtn', false);
            document.getElementById('signupBtn').innerHTML = '<span>Create Account</span><span>✨</span>';
            showToast('Account created! Please sign in.');
            document.getElementById('signupForm').reset();
            setTimeout(() => switchTab('login'), 1000);
        }, 700);
    }
</script>
<script src="analytics.js"></script>
<script>Analytics.init("login");</script>
</body>
</html>
